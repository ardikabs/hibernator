                  properties:
                    cycleId:
                      description: CycleID is the execution cycle identifier.
                      type: string
                    failureCount:
                      description: FailureCount is the number of failed deliveries
                        for this sink key.
                      format: int32
                      type: integer
                    lastFailureTime:
                      description: LastFailureTime is when the most recent failed
                        delivery completed.
                      format: date-time
                      type: string
                    lastSuccessTime:
                      description: LastSuccessTime is when the most recent successful
                        delivery completed.
                      format: date-time
                      type: string
                    message:
                      description: Message is a human-readable description of the
                        most recent delivery outcome.
                      type: string
                    operation:
                      description: Operation is the operation associated with this
                        sink status (shutdown/wakeup).
                      type: string
                    planRef:
                      description: PlanRef identifies the plan this sink status belongs
