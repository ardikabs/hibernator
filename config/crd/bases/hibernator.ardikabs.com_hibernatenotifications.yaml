                      properties:
                        name:
                          description: Name of the HibernatePlan.
                          type: string
                        namespace:
                          description: |-
                            Namespace of the HibernatePlan.
                            If empty, defaults to the exception's namespace.
                          type: string
                      required:
                      - name
                      type: object
                    sinkName:
                      description: SinkName is the sink name as defined in spec.sinks[].name.
                      type: string
                    states:
                      additionalProperties:
                        type: string
                      description: |-
                        States carries sink-specific arbitrary key/value context for this sink key.
                        Keys should be namespaced by sink type (for example,
                        "slack.thread.root_ts") to avoid collisions.
                      type: object
                    success:
                      description: Success indicates whether the most recent delivery
                        attempt succeeded.
                      type: boolean
                    successCount:
                      description: SuccessCount is the number of successful deliveries
                        for this sink key.
                      format: int32
                      type: integer
                    transitionTimestamp:
                      description: TransitionTimestamp is when the most recent delivery
                        attempt completed.
                      format: date-time
                      type: string
                  required:
                  - planRef
                  - sinkName
                  - success
                  - transitionTimestamp
                  type: object
                description: |-
                  SinkStatuses stores tracked per-sink delivery state scoped by
                  sink + plan + cycle + operation.
                  The key format is implementation-defined by the controller.
                  Retention prioritizes relevance: for each sink+plan pair, only the most
                  recent 2 cycle entries are retained.
                type: object
              state:
                default: Detached
                description: |-
                  State is the lifecycle state of this notification: Bound or Detached.
