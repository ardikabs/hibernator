name: Build Latest Image

on:
  workflow_dispatch:

jobs:
  push-latest:
    name: Push Latest Images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Config
        id: setup-config
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Metadata & Caching Improvements ---
      - name: Metadata (Controller)
        id: meta-controller
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest

      - name: Build Controller
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: controller
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-controller.outputs.tags }}
          labels: ${{ steps.meta-controller.outputs.labels }}
          annotations: ${{ steps.meta-controller.outputs.annotations }}
          build-args: |
            VERSION=dev
            COMMIT_HASH=${{ steps.setup-config.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Metadata (Runner)
        id: meta-runner
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-runner
          tags: |
            type=raw,value=latest

      - name: Build Runner
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: runner
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-runner.outputs.tags }}
          labels: ${{ steps.meta-runner.outputs.labels }}
          annotations: ${{ steps.meta-runner.outputs.annotations }}
          build-args: |
            VERSION=dev
            COMMIT_HASH=${{ steps.setup-config.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max