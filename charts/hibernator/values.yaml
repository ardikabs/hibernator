# Default values for Hibernator Operator

# replicaCount -- set to 3 for HA deployment, but can be set to 1 for development or testing environments.
# When using replicaCount > 1, ensure that leaderElection.enabled is set to true to avoid multiple active controllers.
replicaCount: 3

image:
  controller:
    repository: ghcr.io/ardikabs/hibernator
    pullPolicy: IfNotPresent
    tag: ""

  runner:
    repository: ghcr.io/ardikabs/hibernator-runner
    pullPolicy: Always
    tag: ""

# imagePullSecrets -- Optional array of image pull secrets for private registries. Example:
imagePullSecrets: []

# nameOverride -- Optional overrides for the resource names generated by the chart. This can be useful to avoid naming conflicts or to follow specific naming conventions in your cluster.
nameOverride: ""

# fullnameOverride -- Optional override for the full resource names generated by the chart. This can be used to set a specific name for all resources created by the chart, bypassing the default naming convention that includes the release name and chart name.
fullnameOverride: ""

# serviceAccount -- Configuration for the Service Account used by the controller. This includes options for creating a new Service Account, adding annotations (e.g., for IRSA on AWS), and specifying an existing Service Account name if not creating a new one.
serviceAccount:
  # serviceAccount.create -- Whether to create a Service Account for the controller.
  # If false, you must provide an existing Service Account name in serviceAccount.name.
  create: true
  # serviceAccount.annotations -- IRSA annotations for AWS (uncomment and fill if using AWS)
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/hibernator-controller
  annotations: {}
  # serviceAccount.name -- The name of the Service Account to use for the controller.
  # If create is true, this will be the name of the created Service Account.
  # If create is false, this must be set to an existing Service Account name.
  name: ""

# runnerServiceAccount -- Configuration for the Service Account used by the runner pods. Similar to serviceAccount but for the runner.
runnerServiceAccount:
  # runnerServiceAccount.create -- Whether to create a Service Account for the runner pods.
  create: true
  # runnerServiceAccount.annotations -- An extras annotations for the runner Service Account
  # For example, if you want to use IRSA for the runner, you can add the following annotation:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/hibernator-runner
  annotations: {}
  # runnerServiceAccount.name -- The name of the Service Account to use for the runner pods.
  # If create is true, this will be the name of the created Service Account.
  # If create is false, this must be set to an existing Service Account name.
  name: "hibernator-runner"

rbac:
  create: true

# podAnnotations -- Additional annotations to add to the operator pods
podAnnotations: {}

# podSecurityContext -- Security context for the operator pods.
# By default, it runs as non-root with a specific user and group ID for better security.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

# securityContext -- Security context for the operator containers.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# resources -- Resource requests and limits for the operator containers. Adjust these based on your cluster size and expected workload.
resources:
  controller:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  runner:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

# autoscaling -- Enable Horizontal Pod Autoscaler for the operator deployment. Adjust the parameters based on your expected load and cluster capacity.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# nodeSelector -- Node selector for the operator pods. Adjust this to target specific nodes in your cluster if needed.
nodeSelector: {}

# tolerations -- Tolerations for the operator pods. Adjust this to allow the operator to run on tainted nodes if needed.
tolerations: []

# affinity -- Affinity rules for the operator pods. Adjust this to control pod placement based on node labels, topology, etc.
affinity: {}

# webhook -- Configuration for the admission webhook server used for validating and mutating webhooks.
# This includes settings for enabling the webhook, configuring TLS certificates (either with cert-manager or manual generation), and additional parameters for certificate generation if cert-manager is not used.
webhook:
  enabled: true
  port: 9443

  certManager:
    # webhook.certManager.enabled -- Set to true to use cert-manager for managing TLS certificates for the webhook server.
    # If false, the operator will handle certificate generation and management internally.
    enabled: false
    issuer: selfsigned-issuer

  # webhook.certs -- If webhook.certManager.enabled is false, provide custom certs or let auto-generation create them
  certs:
    # webhook.certs.secretName -- The name of the Kubernetes Secret where the TLS certificate and key for the webhook server are stored.
    # This is required if certManager.enabled is false and you want to provide your own certificates.
    secretName: webhook-server-cert

    # webhook.certs.certDir -- The directory where the operator will store the generated TLS certificate and key for the webhook server when certManager is disabled.
    certDir: /tmp/k8s-webhook-server/serving-certs

    # webhook.certs.caBundle -- Optional: Manually provided CA bundle (base64 encoded).
    caBundle: ""  # Optional: Manually provided CA bundle (base64 encoded)

  # webhook.certGen -- Configuration for automatic certificate generation when certManager.enabled is false.
  # This includes settings for using a Job-based approach, certificate duration, and the image used for generation.
  certGen:
    # webhook.certGen.annotations -- Additional annotations for the certificate generation Job/Pod
    annotations:
      "helm.sh/hook": pre-install,pre-upgrade
      "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded

    # webhook.certGen.duration -- A duration in second used for the helm to generate certificate when webhook.certGen.useJob is false.
    # Defaults to 87600 hours (10 years) for Helm-generated certs, but can be adjusted as needed.
    duration: 87600  # Certificate duration in hours (10 years for Helm-generated certs)

    # webhook.certGen.useJob -- Set to true to use Job-based generation (doesn't work with helm template/Kustomize)
    useJob: true

    # webhook.certGen.ttlSecondsAfterFinished -- TTL for the Job to be cleaned up after finishing (in seconds). Defaults to 300 seconds (5 minutes)
    ttlSecondsAfterFinished: 300

    # webhook.certGen.image -- Image used for automatic certificate generation via Job (when certManager.enabled=false, certGen.useJob=true)
    image:
      repository: registry.k8s.io/ingress-nginx/kube-webhook-certgen
      tag: v1.4.0
      pullPolicy: IfNotPresent

    # webhook.certGen.resources -- Resource requests and limits for the certificate generation Job. Adjust these based on your cluster size and expected load during certificate generation.
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

# controlPlane -- The Control plane configuration
controlPlane:
  # controlPlane.endpoint -- Endpoint for the runner to connect to the control plane.
  # This should be the service DNS name of the control plane service (e.g., hibernator-control-plane.hibernator-system.svc) or an external endpoint if using a remote control plane.
  endpoint: "hibernator.hibernator-system.svc"

  # controlPlane.scheduleBufferDuration -- Buffer duration to add to scheduled times to account for scheduling delays (e.g., 1m for 1 minute)
  scheduleBufferDuration: "1m"

  # controlPlane.logging -- Logging configuration for the control plane, including log level, format, and time encoding.
  logging:
    level: info
    format: json
    time: epoch

# operator -- The Operator configuration
operator:
  # operator.workers -- Number of concurrent reconciliations
  workers: 1

  # operator.syncPeriod -- Sync period for reconciliation
  syncPeriod: 10h

  # operator.leaderElection -- Leader election configuration
  leaderElection:
    # operator.leaderElection.enabled -- Set to true to enable leader election for the operator.
    # This is required when running multiple replicas to ensure only one active controller.
    enabled: true
    namespace: ""

# crds -- Custom Resource Definitions configuration
crds:
  create: true
  upgrade: true

# labels -- Additional labels to apply to all resources
labels: {}

# annotations -- Additional annotations to apply to all resources
annotations: {}

# Example AWS CloudProvider to create (optional)
# aws:
#   enabled: false
#   accountId: "123456789012"
#   region: "us-east-1"
#   role: "hibernator-controller"

# Example GCP CloudProvider to create (optional)
# gcp:
#   enabled: false
#   projectId: "my-project"
#   region: "us-central1"
